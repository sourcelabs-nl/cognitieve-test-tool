name: Deploy naar GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

# Rechten die de officiele Pages-actions nodig hebben.
permissions:
  contents: read
  pages: write
  id-token: write

# Eén deploy tegelijk; nieuwe pushes annuleren een lopende run niet halverwege.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      # Project-page: de app staat onder /<repo>/, dus zet de Vite base.
      # Voor een user/org-page (repo heet <gebruiker>.github.io) hoort dit '/'
      # te zijn; pas die regel dan aan.
      - name: Build
        run: npm run build
        env:
          VITE_BASE: /${{ github.event.repository.name }}/

      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
